# ApiChain v2 dev stack. `docker compose up` replaces the v1 Windows
# venv-activate + taskkill-uvicorn-zombies routine entirely.
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://apichain:apichain@db:5432/apichain
    volumes:
      - ./app:/srv/app # dev reload mount
    command:
      [
        "uv", "run", "--no-sync", "uvicorn", "app.main:app",
        "--host", "0.0.0.0", "--port", "8000", "--reload",
      ]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: apichain
      POSTGRES_PASSWORD: apichain
      POSTGRES_DB: apichain
    ports: ["5433:5432"] # 5433 matches the v1 local convention
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apichain"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: apichain
      MINIO_ROOT_PASSWORD: apichain-dev
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data

  mail:
    image: axllent/mailpit
    ports: ["8025:8025", "1025:1025"] # UI :8025, SMTP :1025

volumes:
  pgdata:
  miniodata:
