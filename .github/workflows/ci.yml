name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: apichain
          POSTGRES_PASSWORD: apichain
          POSTGRES_DB: apichain_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U apichain"
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://apichain:apichain@localhost:5432/apichain_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the gitleaks secret scan

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (unit + integration, real Postgres/PostGIS)
        run: uv run pytest -q

      - name: Dependency audit (pip-audit)
        run: |
          uv export --frozen --no-dev --format requirements-txt > requirements-audit.txt
          uv tool run pip-audit -r requirements-audit.txt --disable-pip

      - name: Secret scan (gitleaks binary, no org license needed)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git . --no-banner --redact --exit-code 1

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t apichain-backend:ci .
