# Shared, reusable quality gates called by both v2 repos (05 §6.2 guardrail 4:
# "share one reusable CI workflow across both repos to stop drift"). Hosted in
# apichain-backend; apichain-client calls it cross-repo. Carries only the jobs
# that are identical for both repos; language-specific jobs stay per-repo.
name: quality-gates

on:
  workflow_call:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the gitleaks secret scan
      - name: Secret scan (gitleaks binary, no org license needed)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git . --no-banner --redact --exit-code 1
