# DigitalOcean App Platform spec — apichain-backend (STAGING).
#
# STATUS: TEMPLATE, NOT DEPLOYED. Authored in Phase 0 (WP5) so the deploy shape
# exists and activation is a checklist, not a design exercise. It is UNTESTED
# and intentionally inert: no DO account, token, or managed database exists yet
# (deferred on cost grounds — local `docker compose up` is the dev/test target).
# The env and database blocks below are completed in Phase 1, when the schema
# baseline and real runtime settings land. Do not treat this as working infra.
#
# Activation (add funds + DO account): see DEPLOYMENT.md in this repo.

name: apichain-backend-staging
region: fra # Frankfurt — closest DO region to Kenya

services:
  - name: api
    dockerfile_path: Dockerfile # CI already builds this image on every push
    source_dir: /
    github:
      repo: Apichain-Kenya/apichain-backend
      branch: main
      deploy_on_push: false # CD is driven by the gated .github/workflows/deploy.yml
    http_port: 8000
    instance_size_slug: basic-xxs # ~$5/mo
    instance_count: 1
    health_check:
      http_path: /health # app/main.py:25
    envs:
      # DATABASE_URL binds to the managed DB below once it is provisioned.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # Phase 1+ runtime secrets (SECRET_KEY, object storage, mail) are added
      # here as DO-managed secrets at activation, NOT committed to git.

